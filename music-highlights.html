<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the World - Music Playlist</title>
    <link rel="icon" href="favicon.jpg" type="image/jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body id="music-highlights">
    <div class="top-links">
        <a href="index.html" class="top-link">Back to Gallery</a>
        <a href="music.html" class="top-link">View music list</a>
    </div>
    <h1 class="main-title">A playlist of highlights from the Around the World list</h1>

    <div class="stat-display">
        <span id="statText">0 tracks from 0 highlights</span>
    </div>

    <p class="subtitle">Find the Spotify playlist of highlights <a href="https://open.spotify.com/playlist/5FiWvn8J58Lyy3VFId3Heu?si=84075f56514046f1">here</a></p>

    <nav class="filter-bar music-bar">
        <div class="filter-group sort">
            <label for="sortFilter">Sort</label>
            <select id="sortFilter">
                <option value="alpha">Track A–Z</option>
                <option value="date">Artist A–Z</option>
            </select>
        </div>

        <div class="filter-group continent">
            <label for="continentFilter">Continent</label>
            <select id="continentFilter">
                <option value="all">All</option>
                <option value="Africa">Africa</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="North America">North America</option>
                <option value="South America">South America</option>
                <option value="Oceania">Oceania</option>
            </select>
        </div>

        <div class="filter-group random">
            <button id="randomPicker">Random entry</button>
        </div>

        <div class="filter-group search">
            <label for="searchInput">Search</label>
            <input type="text" id="searchInput" placeholder="Find a country, artist or album...">
        </div>
    </nav>

    <div class="container">
        <div id="musicList" class="music-list"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Music page rendering
        let musicSearchEl;
        let musicContinentEl;
        let musicSortEl;

        function setupMusicFilters() {
            musicSearchEl = document.getElementById("searchInput");
            musicContinentEl = document.getElementById("continentFilter");
            musicSortEl = document.getElementById("sortFilter");
            const renderFn = isMusicHighlightsPage ? renderHighlights : renderMusic;

            if (musicSearchEl) musicSearchEl.addEventListener("input", renderFn);
            if (musicContinentEl) musicContinentEl.addEventListener("change", renderFn);
            if (musicSortEl) musicSortEl.addEventListener("change", renderFn);
        }

        function renderHighlights() {
            const musicListEl = document.getElementById("musicList");
            if (!musicListEl) return;

            musicListEl.innerHTML = "";

            const search = musicSearchEl?.value.toLowerCase() || "";
            const sortMode = musicSortEl?.value || "alpha";

            let filtered = highlightsData.filter(item =>
                search === "" ||
                item.track_name.toLowerCase().includes(search) ||
                item.artist_name.toLowerCase().includes(search) ||
                item.album_name.toLowerCase().includes(search) ||
                (item.style_note || "").toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                musicListEl.innerHTML = '<div class="empty-state">No highlights found.</div>';
                updateStats(highlightsData, 'highlights');
                return;
            }

            if (sortMode === "date") {
                filtered.sort((a, b) => a.artist_name.localeCompare(b.artist_name));
            } else {
                filtered.sort((a, b) => a.track_name.localeCompare(b.track_name));
            }

            filtered.forEach(entry => {
                const item = document.createElement("div");
                item.classList.add("music-item");

                const flagDiv = document.createElement("div");
                flagDiv.classList.add("flag-thumbnail");

                const flagImg = document.createElement("img");
                if (entry.country) {
                    const countryCode = entry.country.trim().toLowerCase();
                    if (countryCode.includes("/") || countryCode.startsWith("http")) {
                        flagImg.src = entry.country;
                    } else if (countryCode.length === 2) {
                        flagImg.src = `https://flagcdn.com/w160/${countryCode}.png`;
                    } else {
                        flagImg.src = `https://flagcdn.com/w160/${countryCode}.png`;
                    }
                    flagImg.alt = `Flag of ${entry.country}`;
                } else {
                    flagImg.src = "";
                    flagImg.alt = "No flag";
                }
                flagDiv.appendChild(flagImg);

                const details = document.createElement("div");
                details.classList.add("music-details");

                const countryName = document.createElement("div");
                countryName.classList.add("country-name");
                countryName.textContent = entry.country || entry.track_name;
                details.appendChild(countryName);

                const artist = document.createElement("div");
                artist.classList.add("music-artist");
                artist.textContent = entry.artist_name;
                details.appendChild(artist);

                const album = document.createElement("div");
                album.classList.add("music-album");
                const spotifyUrl = entry.spotify_uri?.startsWith("spotify:")
                    ? entry.spotify_uri.replace("spotify:track:", "https://open.spotify.com/track/")
                    : entry.spotify_uri;
                if (spotifyUrl) {
                    const a = document.createElement("a");
                    a.href = spotifyUrl;
                    a.target = "_blank";
                    a.rel = "noopener noreferrer";
                    a.textContent = entry.album_name || "Listen";
                    album.appendChild(a);
                } else {
                    album.textContent = entry.album_name || "";
                }
                details.appendChild(album);

                if (entry.style_note) {
                    const desc = document.createElement("div");
                    desc.classList.add("music-desc");
                    desc.textContent = entry.style_note;
                    details.appendChild(desc);
                }

                item.appendChild(flagDiv);
                item.appendChild(details);
                musicListEl.appendChild(item);
            });

            updateStats(highlightsData, 'highlights');
        }

        // Random picker functionality
        document.getElementById("randomPicker").addEventListener("click", pickRandom);

        function pickRandom() {
            const musicListEl = document.getElementById("musicList");
            const items = musicListEl.querySelectorAll(".music-item");
            if (items.length === 0) return;
            const randomIndex = Math.floor(Math.random() * items.length);
            const randomItem = items[randomIndex];
            randomItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Highlight temporarily
            randomItem.style.backgroundColor = 'yellow';
            setTimeout(() => randomItem.style.backgroundColor = '', 2000);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the World - Music List</title>
    <link rel="icon" href="favicon.jpg" type="image/jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-links">
        <a href="index.html" class="top-link">Back to Gallery</a>
        <a href="books.html" class="top-link">View books list</a>
    </div>
    <h1 class="main-title">My virtual record collection</h1>

    <div class="stat-display">
        <span id="statText">0 records from 0 countries</span>
    </div>

    <p class="subtitle">Spotify playlist of highlights <a href="https://open.spotify.com/playlist/5FiWvn8J58Lyy3VFId3Heu?si=84075f56514046f1">here</a></p>

    <nav class="filter-bar music-bar">
        <div class="filter-group sort">
            <label for="sortFilter">Sort</label>
            <select id="sortFilter">
                <option value="alpha">Country A–Z</option>
                <option value="date">National Day</option>
            </select>
        </div>

        <div class="filter-group continent">
            <label for="continentFilter">Continent</label>
            <select id="continentFilter">
                <option value="all">All</option>
                <option value="Africa">Africa</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="North America">North America</option>
                <option value="South America">South America</option>
                <option value="Oceania">Oceania</option>
            </select>
        </div>

        <div class="filter-group random">
            <button id="randomPicker">Random entry</button>
        </div>

        <div class="filter-group search">
            <label for="searchInput">Search</label>
            <input type="text" id="searchInput" placeholder="Find a country, artist or album...">
        </div>
    </nav>

    <div class="container">
        <div id="musicList" class="music-list"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Music page rendering
        let musicSearchEl;
        let musicContinentEl;
        let musicSortEl;

        function setupMusicFilters() {
            musicSearchEl = document.getElementById("searchInput");
            musicContinentEl = document.getElementById("continentFilter");
            musicSortEl = document.getElementById("sortFilter");

            if (musicSearchEl) musicSearchEl.addEventListener("input", renderMusic);
            if (musicContinentEl) musicContinentEl.addEventListener("change", renderMusic);
            if (musicSortEl) musicSortEl.addEventListener("change", renderMusic);
        }

        function renderMusic() {
            const musicListEl = document.getElementById("musicList");
            if (!musicListEl) return;

            musicListEl.innerHTML = "";

            const search = musicSearchEl?.value.toLowerCase() || "";
            const continent = musicContinentEl?.value || "all";
            const sortMode = musicSortEl?.value || "alpha";

            const musicItems = countriesData.filter(c =>
                c.music &&
                c.music.length > 0 &&
                c.highlights &&
                c.highlights.length > 0 &&
                (search === "" || c.name.toLowerCase().includes(search) || 
                 c.music.some(m => 
                    (m.artist?.toLowerCase().includes(search)) ||
                    (m.album_or_playlist?.toLowerCase().includes(search)) ||
                    (m.description?.toLowerCase().includes(search))
                 )
                ) &&
                (continent === "all" || c.continent === continent)
            );

            if (musicItems.length === 0) {
                musicListEl.innerHTML = '<div class="empty-state">No music recorded yet.</div>';
                updateStats(countriesData, 'music');
                return;
            }

            // Flatten music entries based on HIGHLIGHTS, not the full music array
let flatMusic = [];
musicItems.forEach(country => {
    // We only want the specific highlights, usually just the first one
    country.highlights.forEach((highlight, i) => {
        // Find the corresponding music metadata (artist, url, etc.)
        // This defaults to the first music entry if the indexes don't match perfectly
        const m = country.music[i] || country.music[0]; 
        
        flatMusic.push({
            ...m,
            countryName: country.name,
            countryCode: country.code,
            type: country.type,
            date: country.date, // Ensure date is passed for sorting
            track_name: highlight.track_name,
            highlight_description: highlight.highlight_description
        });
    });
});
            // Sort
            if (sortMode === "date") {
                flatMusic.sort((a, b) => {
                    // Convert DD-MM to MM-DD for proper calendar sorting
                    const convertToSortable = (dateStr) => {
                        if (!dateStr) return "99-99";
                        const [day, month] = dateStr.split('-');
                        return `${month}-${day}`;
                    };
                    return convertToSortable(a.date).localeCompare(convertToSortable(b.date));
                });
            } else {
                // A-Z: countries first, then territories
                flatMusic.sort((a, b) => {
                    if (a.type !== b.type) {
                        return a.type === 'country' ? -1 : 1;  // countries before territories
                    }
                    return a.countryName.localeCompare(b.countryName);
                });
            }

            // Render
            flatMusic.forEach(entry => {
                const item = document.createElement("div");
                item.classList.add("music-item");

                const flagDiv = document.createElement("div");
                flagDiv.classList.add("flag-thumbnail");
                const img = document.createElement("img");
                if (entry.countryCode && (entry.countryCode.includes("/") || entry.countryCode.startsWith("http"))) {
                    img.src = entry.countryCode;
                } else if (entry.countryCode) {
                    img.src = `https://flagcdn.com/w160/${entry.countryCode}.png`;
                }
                img.alt = `Flag of ${entry.countryName}`;
                flagDiv.appendChild(img);

                const details = document.createElement("div");
                details.classList.add("music-details");

                const countryName = document.createElement("div");
                countryName.classList.add("country-name");
                countryName.textContent = entry.countryName;
                details.appendChild(countryName);

                const artist = document.createElement("div");
                artist.classList.add("music-artist");
                artist.textContent = entry.artist || "";
                details.appendChild(artist);

                const album = document.createElement("div");
                album.classList.add("music-album");
                if (entry.track_name) {
                    if (entry.url) {
                        const a = document.createElement("a");
                        a.href = entry.url;
                        a.target = "_blank";
                        a.rel = "noopener noreferrer";
                        a.textContent = entry.track_name;
                        album.appendChild(a);
                    } else {
                        album.textContent = entry.track_name;
                    }
                }
                details.appendChild(album);

                if (entry.highlight_description) {
                    const desc = document.createElement("div");
                    desc.classList.add("music-desc");
                    desc.textContent = entry.highlight_description;
                    details.appendChild(desc);
                }

                if (entry.date) {
                    const dateEl = document.createElement("div");
                    dateEl.classList.add("music-date");
                    // Format DD-MM to DD-MMM
                    const [day, month] = entry.date.split("-");
                    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    const monthIndex = parseInt(month) - 1;
                    const formatted = `${day}-${monthNames[monthIndex]}`;
                    dateEl.textContent = `National day: ${formatted}`;
                    details.appendChild(dateEl);
                }

                item.appendChild(flagDiv);
                item.appendChild(details);
                musicListEl.appendChild(item);
            });

            updateStats(countriesData, 'music');
        }

        // Random picker functionality
        document.getElementById("randomPicker").addEventListener("click", pickRandom);

        function pickRandom() {
            const musicListEl = document.getElementById("musicList");
            const items = musicListEl.querySelectorAll(".music-item");
            if (items.length === 0) return;
            const randomIndex = Math.floor(Math.random() * items.length);
            const randomItem = items[randomIndex];
            randomItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Highlight temporarily
            randomItem.style.backgroundColor = 'yellow';
            setTimeout(() => randomItem.style.backgroundColor = '', 2000);
        }
    </script>

<div class="spotify-footer-container">
    <div class="spotify-footer-content">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/5FiWvn8J58Lyy3VFId3Heu?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>
</div>

</body>
</html>
